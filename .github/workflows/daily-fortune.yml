name: Daily Zodiac Fortune

on:
  schedule:
    # 매일 06:00 UTC (한국시간 15:00) 실행
    - cron: '0 6 * * *'

  # 수동 테스트용 (Actions 탭에서 실행 가능)
  workflow_dispatch:

jobs:
  send-fortune:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run zodiac fortune bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python zodiac_fortune_bot.py

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: fortune-output
          path: output/
          retention-days: 7
